function escapeHtml(s){
  if(s===null||s===undefined) return '';
  return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
// 텍스트 안의 URL과 알려진 키워드를 클릭 가능한 링크로 바꿔서 반환 (나머지 텍스트는 그대로, 줄바꿈은 <br>)
function linkify(text){
  if(!text) return '-';
  let out = escapeHtml(text);
  out = out.replace(/(https?:\/\/[^\s]+)/g, url => `<a href="${url}" target="_blank" rel="noopener">${url} ↗</a>`);
  Object.keys(LINK_MAP).forEach(kw => {
    if(out.includes(kw) && !out.includes(`>${kw}<`)){
      const re = new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'g');
      out = out.replace(re, `<a href="${LINK_MAP[kw]}" target="_blank" rel="noopener">${kw} ↗</a>`);
    }
  });
  return out.replace(/\n/g, '<br>');
}

async function boot(){
  renderTabs();
  await loadAllTabs();
  renderCurrentTab();
}

function renderTabs(){
  const bar = document.getElementById('tabsBar');
  bar.innerHTML = TABS.map(t => `<button class="${t.key===activeTab?'active':''}" data-tab="${t.key}">${t.label}</button>`).join('');
  bar.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      activeTab = btn.dataset.tab;
      editingId = null;
      document.getElementById('globalSearch').value = '';
      toggleForm(false);
      renderTabs();
      renderCurrentTab();
    });
  });
}

async function loadAllTabs(){
  const snap = await db.collection(COL).get();
  const loaded = {};
  snap.docs.forEach(d => { loaded[d.id] = d.data().rows || []; });
  TABS.forEach(t => {
    if(loaded[t.key] && loaded[t.key].length){
      state[t.key] = loaded[t.key];
    }else if(!loaded[t.key]){
      // 처음 실행: 인수인계서 원본 데이터로 시드
      state[t.key] = (SEED[t.key]||[]).map(r=>({ id: cryptoId(), ...r }));
      db.collection(COL).doc(t.key).set({ rows: state[t.key] });
    }else{
      state[t.key] = [];
    }
  });
}
function cryptoId(){ return 'id_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8); }
async function saveTab(key){
  await db.collection(COL).doc(key).set({ rows: state[key] });
}

/* ---------------- 목록 렌더 ---------------- */
function renderCurrentTab(){
  const def = tabDef(activeTab);
  const kw = document.getElementById('globalSearch').value.trim().toLowerCase();
  let rows = state[activeTab] || [];
  if(kw){
    rows = rows.filter(r => def.fields.some(f => (r[f.k]||'').toString().toLowerCase().includes(kw)));
  }
  const wrap = document.getElementById('listWrap');
  if(!rows.length){ wrap.innerHTML = '<div class="empty">등록된 항목이 없습니다.</div>'; return; }

  wrap.innerHTML = rows.map(r => {
    const title = r[def.titleField] || '(제목없음)';
    const tagVal = def.tagField ? r[def.tagField] : '';
    const tagClass = def.key==='todo' ? `priority-${r.priority||''}` : '';
    return `
    <div class="card">
      <div class="card-top">
        <div class="card-title">${escapeHtml(title)}</div>
        ${tagVal ? `<span class="card-tag ${tagClass}">${escapeHtml(tagVal)}</span>` : ''}
      </div>
      ${def.fields.filter(f=>f.k!==def.titleField).map(f => {
        const val = r[f.k];
        if(!val) return '';
        return `<div class="card-row"><b>${f.label.split('(')[0].trim()}</b>${linkify(val)}</div>`;
      }).join('')}
      <div class="card-actions">
        <button class="secondary small" onclick="editRow('${r.id}')">✏️ 수정</button>
        <button class="danger small" onclick="deleteRow('${r.id}')">삭제</button>
      </div>
    </div>`;
  }).join('');
}

/* ---------------- 등록/수정 폼 ---------------- */
function toggleForm(force){
  const box = document.getElementById('formBox');
  if(force === false){ box.classList.remove('open'); editingId=null; return; }
  if(!box.classList.contains('open')){
    buildForm();
    box.classList.add('open');
  }else{
    box.classList.remove('open');
    editingId = null;
  }
}
function buildForm(existing){
  const def = tabDef(activeTab);
  const box = document.getElementById('formBox');
  box.innerHTML = `
    <div class="form-grid">
      ${def.fields.map(f => `
        <label style="${f.type==='textarea'?'grid-column:1/-1;':''}">
          ${f.label}
          ${f.type==='textarea'
            ? `<textarea id="gf_${f.k}">${existing?escapeHtml(existing[f.k]||''):''}</textarea>`
            : `<input type="text" id="gf_${f.k}" value="${existing?escapeHtml(existing[f.k]||''):''}">`}
        </label>`).join('')}
    </div>
    <div class="form-actions">
      <button class="primary" onclick="submitForm()">${existing?'수정 저장':'등록'}</button>
      <button class="secondary" onclick="toggleForm(false)">취소</button>
    </div>
  `;
}
function editRow(id){
  const def = tabDef(activeTab);
  const r = (state[activeTab]||[]).find(x=>x.id===id);
  if(!r) return;
  editingId = id;
  const box = document.getElementById('formBox');
  buildForm(r);
  box.classList.add('open');
  window.scrollTo({top:0, behavior:'smooth'});
}
async function submitForm(){
  const def = tabDef(activeTab);
  const rec = {};
  def.fields.forEach(f => { rec[f.k] = document.getElementById('gf_'+f.k).value.trim(); });
  if(!rec[def.titleField]){ alert(`${def.fields.find(f=>f.k===def.titleField).label}은(는) 필수입니다.`); return; }

  if(editingId){
    const idx = state[activeTab].findIndex(x=>x.id===editingId);
    if(idx>=0) state[activeTab][idx] = { id: editingId, ...rec };
  }else{
    state[activeTab].push({ id: cryptoId(), ...rec });
  }
  await saveTab(activeTab);
  toggleForm(false);
  renderCurrentTab();
}
async function deleteRow(id){
  if(!confirm('이 항목을 삭제하시겠습니까?')) return;
  state[activeTab] = state[activeTab].filter(x=>x.id!==id);
  await saveTab(activeTab);
  renderCurrentTab();
}

/* ---------------- PDF 내보내기 (인쇄 화면 → 브라우저 인쇄로 PDF 저장) ---------------- */
function buildPrintTable(def, rows){
  if(!rows.length){
    return `<p style="font-size:12px;color:var(--muted);">등록된 항목이 없습니다.</p>`;
  }
  return `<table class="print-table"><thead><tr>
    ${def.fields.map(f=>`<th>${escapeHtml(f.label.split('(')[0].trim())}</th>`).join('')}
  </tr></thead><tbody>
    ${rows.map(r => `<tr>${def.fields.map(f=>`<td>${linkify(r[f.k])}</td>`).join('')}</tr>`).join('')}
  </tbody></table>`;
}
function exportPdf(allTabs){
  const today = new Date().toLocaleDateString('ko-KR');
  const area = document.getElementById('printArea');

  if(!allTabs){
    const def = tabDef(activeTab);
    const kw = document.getElementById('globalSearch').value.trim().toLowerCase();
    let rows = state[activeTab] || [];
    if(kw) rows = rows.filter(r => def.fields.some(f => (r[f.k]||'').toString().toLowerCase().includes(kw)));
    area.innerHTML = `
      <div class="print-page">
        <div class="print-title">총무업무 — ${def.label}</div>
        <div class="print-sub">바론네트웍스(주) 총무팀 · 출력일 ${today}${kw?` · 검색어: "${escapeHtml(kw)}"`:''}</div>
        ${buildPrintTable(def, rows)}
      </div>`;
  }else{
    area.innerHTML = TABS.map(def => `
      <div class="print-page">
        <div class="print-title">총무업무</div>
        <div class="print-sub">바론네트웍스(주) 총무팀 · 출력일 ${today}</div>
        <div class="print-section-title">${def.label}</div>
        ${buildPrintTable(def, state[def.key]||[])}
      </div>`).join('');
  }
  window.print();
}
</script>
